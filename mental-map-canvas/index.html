<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mental Map Canvas</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="toolbar" aria-label="Canvas controls">
      <div class="toolbar-group" role="group" aria-label="Modes">
        <button id="selectModeButton" type="button" class="tool-button active" title="Select / pan (V)" aria-pressed="true">V</button>
        <button id="drawModeButton" type="button" class="tool-button" title="Draw (D)" aria-pressed="false">D</button>
      </div>
      <div class="toolbar-group" role="group" aria-label="Document">
        <button id="clearButton" type="button">Clear canvas</button>
        <button id="exportButton" type="button">Export JSON</button>
        <label class="file-button" for="importInput">Import JSON</label>
        <input id="importInput" type="file" accept="application/json,.json">
      </div>
      <div class="toolbar-group" role="group" aria-label="Viewport">
        <button id="resetViewButton" type="button">Reset view</button>
        <output id="zoomLevel" aria-live="polite">100%</output>
      </div>
    </header>

    <main class="canvas-shell">
      <svg id="canvas" xmlns="http://www.w3.org/2000/svg" aria-label="Infinite drawing canvas">
        <defs>
          <pattern id="minorGrid" width="32" height="32" patternUnits="userSpaceOnUse">
            <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(36, 48, 66, 0.12)" stroke-width="1"></path>
          </pattern>
          <pattern id="majorGrid" width="160" height="160" patternUnits="userSpaceOnUse">
            <rect width="160" height="160" fill="url(#minorGrid)"></rect>
            <path d="M 160 0 L 0 0 0 160" fill="none" stroke="rgba(36, 48, 66, 0.2)" stroke-width="1.25"></path>
          </pattern>
        </defs>
        <rect id="grid" width="100%" height="100%" fill="url(#majorGrid)"></rect>
        <g id="world"></g>
      </svg>
    </main>

    <script src="src/model.js"></script>
    <script src="src/viewport.js"></script>
    <script src="src/storage.js"></script>
    <script src="src/render.js"></script>
    <script src="src/input.js"></script>
    <script src="src/main.js"></script>
  </body>
</html>
